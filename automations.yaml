- id: motion_sensors_auto_heal
  alias: Motion Sensors Auto-Heal (Default Timeout)
  description: Heal stuck motion sensors
  triggers:
  - entity_id:
    - binary_sensor.dining_room_sensor_motion_detection
    - binary_sensor.living_room_sensor_motion_detection
    - binary_sensor.mud_room_sensor_motion_detection
    - binary_sensor.kitchen_sensor_motion_detection
    - binary_sensor.den_sensor_motion_detection
    - binary_sensor.hallway_sensor_motion_detection
    - binary_sensor.guest_bathroom_light_motion_detection
    - binary_sensor.pantry_lights_motion_detection
    - binary_sensor.air_handler_lights_motion_detection
    - binary_sensor.garage_lights_motion_detection
    - binary_sensor.west_bedroom_sensor_motion_detection
    - binary_sensor.east_bedroom_sensor_motion_detection
    - binary_sensor.upstairs_bathroom_sensor_motion_detection
    - binary_sensor.guest_bedroom_sensor_motion_detection
    - binary_sensor.laundry_room_sensor_motion_detection
    - binary_sensor.master_bathroom_sensor_motion_detection
    - binary_sensor.master_walking_closet_lights_motion_detection
    - binary_sensor.master_bedroom_sensor_motion_detection
    - binary_sensor.family_room_sensor_motion_detection
    - binary_sensor.stairs_sensor_motion_detection
    - binary_sensor.server_room_lights_motion_detection
    - binary_sensor.laundry_room_lights_motion_detection
    - binary_sensor.master_bathroom_toilet_lights_motion_detection
    - binary_sensor.master_bedroom_closet_lights_motion_detection
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 240
    to:
    - 'on'
  actions:
  - data:
      entity_id: '{{ motion_entity }}'
      state: 'off'
      attributes:
        healed_by: motion_autoheal
        healed_at: '{{ now() }}'
        assumed_param3: '{{ default_timeout }}'
        heal_after_seconds: '{{ heal_after }}'
    action: python_script.set_state
  mode: parallel
  variables:
    default_timeout: 240
    heal_margin: 30
    heal_after: '{{ default_timeout + heal_margin }}'
    motion_entity: '{{ trigger.entity_id }}'
    last_changed: '{{ as_timestamp(states[motion_entity].last_changed) }}'
    now_ts: '{{ as_timestamp(now()) }}'
