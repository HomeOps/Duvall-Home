- id: '1777240114710'
  alias: fresh_air_fan_when_idle_and_outdoor_cool
  description: Whole-home fan ON during HVAC idle when outdoor is colder than indoor
    and indoor is above target.  Free pre-cooling — does not fight an active heating
    or cooling cycle (fan turns off the moment hvac_action leaves 'idle').  Defaults
    are chosen so any missing/unknown sensor value resolves to "fan off".
  triggers:
  - entity_id: climate.smart_climate
    attribute: hvac_action
    trigger: state
  - entity_id:
    - sensor.outdoor_air_quality_sensor_temperature
    - sensor.whole_home_temperature
    for: 00:02:00
    trigger: state
  - minutes: /15
    trigger: time_pattern
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ should_be_on and not fan_on_now }}'
      sequence:
      - target:
          entity_id: switch.whole_home_fan
        action: switch.turn_on
    - conditions:
      - condition: template
        value_template: '{{ (not should_be_on) and fan_on_now }}'
      sequence:
      - target:
          entity_id: switch.whole_home_fan
        action: switch.turn_off
  mode: single
  variables:
    indoor: '{{ state_attr(''climate.smart_climate'', ''current_temperature'') | float(0)
      }}'
    target: '{{ state_attr(''climate.smart_climate'', ''temperature'')         | float(99)
      }}'
    outdoor: '{{ states(''sensor.outdoor_air_quality_sensor_temperature'')    | float(99)
      }}'
    action: '{{ state_attr(''climate.smart_climate'', ''hvac_action'') | string |
      lower }}'
    margin: 1
    fan_on_now: '{{ is_state(''switch.whole_home_fan'', ''on'') }}'
    should_be_on: "{{ action == 'idle'\n   and outdoor < (indoor - margin)\n   and
      indoor > target }}"
- id: ping_dead_zwave_nodes
  alias: Ping Dead Z-Wave Nodes
  description: Pings any Z-Wave node currently in 'dead' state. Discovers nodes dynamically
    from sensor.*_node_status — never hard-coded. Runs every 2 minutes so a flapping
    driver cannot spam pings.
  triggers:
  - minutes: /2
    trigger: time_pattern
  conditions:
  - value_template: '{{ states.sensor | selectattr(''entity_id'',''search'',''_node_status$'')
      | selectattr(''state'',''eq'',''dead'') | list | count > 0 }}'
    condition: template
  actions:
  - variables:
      dead_nodes: '{{ states.sensor | selectattr(''entity_id'',''search'',''_node_status$'')
        | selectattr(''state'',''eq'',''dead'') | map(attribute=''entity_id'') | list
        }}'
  - action: logbook.log
    data:
      name: Z-Wave heal
      message: 'Pinging dead nodes: {{ dead_nodes | join('', '') }}'
  - repeat:
      sequence:
      - target:
          entity_id: '{{ repeat.item | replace(''sensor.'',''button.'') | replace(''_node_status'',''_ping'')
            }}'
        continue_on_error: true
        action: button.press
      - delay: 00:00:02
      for_each: '{{ dead_nodes }}'
  max_exceeded: silent
  mode: single
