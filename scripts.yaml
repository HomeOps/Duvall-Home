good_morning:
  alias: Good Morning!
  sequence:
  - alias: ''
    data:
      entity_id: alarm_control_panel.ha_alarm
    service: alarm_control_panel.alarm_disarm
  - data:
      entity_id: lock.mud_room_lock
    service: lock.unlock
  - data: {}
    entity_id:
    - switch.living_electronics
    - switch.den_pc_printer
    - switch.den_network_switch
    - switch.tv_room_plug_1
    - switch.tv_room_plug_2
    - switch.tv_room_plug_3
    service: switch.turn_on
good_night:
  alias: Good Night!
  sequence:
  - data: {}
    service: alarm_control_panel.alarm_arm_night
    target:
      entity_id: alarm_control_panel.ha_alarm
  - data: {}
    service: lock.lock
    target:
      entity_id: group.perimeter_locks
  - data:
      entity_id: climate.thermostat
      preset_mode: sleep
    service: climate.set_preset_mode
  - data:
      sc_message: Good night!
    service: script.notify
  mode: single
goodbye:
  alias: Goodbye!
  sequence:
  - alias: ''
    data:
      entity_id: alarm_control_panel.ha_alarm
    service: alarm_control_panel.alarm_arm_away
  - data:
      entity_id: climate.thermostat
      preset_mode: away
    service: climate.set_preset_mode
  - service: script.lights_off
  - data:
      entity_id: group.perimeter_covers
    service: cover.close_cover
  - data:
      entity_id: group.perimeter_locks
    service: lock.lock
  - data:
      sc_message: Arming security system
    service: script.notify
i_am_back:
  alias: I am back!
  sequence:
  - alias: ''
    data:
      entity_id: alarm_control_panel.ha_alarm
    service: alarm_control_panel.alarm_disarm
  - data:
      entity_id: lock.mud_room_lock
    service: lock.unlock
  - data:
      entity_id: climate.thermostat
      preset_mode: home
    service: climate.set_preset_mode
  - data:
      entity_id: climate.thermostat
    service: ecobee.resume_program
  - data:
      entity_id: group.always_on_switches
    service: switch.turn_on
  - data:
      sc_message: Welcome back
    service: script.notify
lights_off:
  alias: Lights Off
  sequence:
  - data:
      entity_id: group.all_lights
    service: light.turn_off
  - data:
      entity_id: group.all_light_switches
    service: switch.turn_off
  - data:
      entity_id: cover.all_blinds
    service: cover.close_cover
  - data:
      entity_id: all
    entity_id: all
    service: remote.turn_off
  - data: {}
    entity_id: all
    service: media_player.media_stop
notify:
  alias: Notify
  sequence:
  - service: tts.google_translate_say
    data:
      entity_id: media_player.kitchen_display
      message: '{{ sc_message }}'
      cache: true
workout:
  alias: Workout
  sequence:
  - data:
      entity_id: cover.tv_room_blinds
    service: cover.close_cover
  - data:
      entity_id: light.tv_room_lights
    service: light.turn_on
notify_external:
  alias: NotifyExternal
  sequence:
  - data: {}
    data_template:
      message: Interface {{ sc_intf }} going into {{ sc_status }}
    service: notify.sms_oscar
irrigate_home:
  alias: Irrigate home
  sequence:
  - data: {}
    entity_id: switch.irrigation_controller_zone_3
    service: switch.turn_on
  - delay: 00:15:00
  - data: {}
    entity_id: switch.irrigation_controller_zone_2
    service: switch.turn_on
turn_on_samsung_kitchen_speaker:
  alias: Turn on Kitchen Speaker
  mode: single
  sequence:
  - data: {}
    entity_id: switch.kitchen_electronics
    service: switch.turn_on
  - delay: 00:00:10
  - data: {}
    entity_id: media_player.samsung_kitchen_soundbar
    service: media_player.turn_on
  - data:
      source: hdmi
    entity_id: media_player.samsung_kitchen_soundbar
    service: media_player.select_source
  - data:
      volume_level: 0.8
    entity_id: media_player.samsung_kitchen_soundbar
    service: media_player.volume_set
heal_stuck_motion_sensors_at_startup:
  alias: Heal Stuck Motion Sensors at Startup
  description: Heal any motion sensors already stuck ON when Home Assistant starts
  mode: single
  variables:
    default_timeout: 240
    start_time:
      '[object Object]':
    sensors:
    - binary_sensor.dining_room_sensor_motion_detection
    - binary_sensor.living_room_sensor_motion_detection
    - binary_sensor.mud_room_sensor_motion_detection
    - binary_sensor.kitchen_sensor_motion_detection
    - binary_sensor.den_sensor_motion_detection
    - binary_sensor.hallway_sensor_motion_detection
    - binary_sensor.guest_bathroom_light_motion_detection
    - binary_sensor.pantry_lights_motion_detection
    - binary_sensor.air_handler_lights_motion_detection
    - binary_sensor.garage_lights_motion_detection
    - binary_sensor.west_bedroom_sensor_motion_detection
    - binary_sensor.east_bedroom_sensor_motion_detection
    - binary_sensor.upstairs_bathroom_sensor_motion_detection
    - binary_sensor.guest_bedroom_sensor_motion_detection
    - binary_sensor.laundry_room_sensor_motion_detection
    - binary_sensor.master_bathroom_sensor_motion_detection
    - binary_sensor.master_walking_closet_lights_motion_detection
    - binary_sensor.master_bedroom_sensor_motion_detection
    - binary_sensor.family_room_sensor_motion_detection
    - binary_sensor.stairs_sensor_motion_detection
    - binary_sensor.server_room_lights_motion_detection
    - binary_sensor.laundry_room_lights_motion_detection
    - binary_sensor.master_bathroom_toilet_lights_motion_detection
    - binary_sensor.master_bedroom_closet_lights_motion_detectionn
  sequence:
  - repeat:
      for_each: '{{ sensors }}'
      sequence:
      - variables:
          id: '{{ repeat.item|string }}'
          st: '{{ states[id] }}

            '
          sensor_state: '{{ (states(id))|string }}

            '
          motion_on: '{{ sensor_state == ''on'' }}

            '
      - if:
        - condition: template
          value_template: '{{ motion_on }}'
        then:
        - variables:
            last_changed: '{{ as_timestamp(states[id].last_changed) }}'
            now_timestamp: '{{ as_timestamp(now()) }}'
            seconds_in_motion: '{{ now_timestamp - last_changed }}'
            should_reset: '{{ seconds_in_motion > default_timeout }}'
        - if:
          - condition: template
            value_template: '{{ should_reset }}'
          then:
          - data:
              entity_id: '{{ id }}'
              state: 'off'
              attributes:
                healed_by: motion_autoheal_startup
                healed_at: '{{ now() }}'
                assumed_param3: '{{ default_timeout }}'
            action: python_script.set_state
